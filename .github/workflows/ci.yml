name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest AWS/ OnPrem/Linux/ tests/ -v --import-mode=importlib

  pester:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0

      - name: Run Pester tests
        shell: pwsh
        run: Invoke-Pester -Path Azure, OnPrem/Windows -Output Detailed
